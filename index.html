<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ritual Snake</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap');

:root {
  --mint-1: #e8f5f0;
  --mint-2: #b8e8d8;
  --mint-3: #7dd4b8;
  --mint-4: #4dba96;
  --mint-5: #2d9e7a;
  --mint-6: #1d7a5e;
  --mint-glow: #5eecc0;
  --bg: #0a1a14;
  --bg-card: rgba(12, 28, 22, 0.9);
  --gold: #d4a843;
  --gold-light: #f0d68a;
  --text: #d8f0e6;
  --text-dim: #6a9e88;
  --pixel-border: #3d9e82;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%; overflow: hidden;
  touch-action: none;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Silkscreen', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  height: 100dvh;
}

/* Pixel scanline overlay */
.scanlines {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.08) 3px,
    rgba(0,0,0,0.08) 4px
  );
}

/* Background pattern */
.bg-pattern {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.03; filter: brightness(2);
  background-size: 60px 60px; background-repeat: repeat;
}

/* Header */
.header {
  position: relative; z-index: 10;
  text-align: center; padding: 10px 0 4px;
}

.title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(14px, 3.2vw, 20px);
  color: var(--mint-glow);
  text-shadow: 0 0 10px rgba(94,236,192,0.4), 2px 2px 0 var(--mint-6);
  letter-spacing: 2px;
}

.subtitle {
  font-size: 8px; color: var(--text-dim);
  letter-spacing: 2px; margin-top: 2px;
}

.credit {
  font-size: 7px; color: var(--text-dim);
  letter-spacing: 1px; opacity: 0.6; margin-top: 1px;
}

/* Score bar */
.score-bar {
  display: flex; justify-content: center; gap: 24px;
  padding: 6px 0; position: relative; z-index: 10;
}

.stat-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; color: var(--text-dim);
  letter-spacing: 1px; text-transform: uppercase;
}

.stat-value {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px; color: var(--gold-light);
  text-shadow: 1px 1px 0 rgba(212,168,67,0.3);
}

/* Game canvas wrapper */
.game-wrap {
  position: relative; z-index: 10;
  margin: 4px auto;
}

canvas {
  display: block;
  border: 2px solid var(--pixel-border);
  border-radius: 4px;
  box-shadow: 0 0 20px rgba(94,236,192,0.08), inset 0 0 40px rgba(10,26,20,0.5);
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* Controls */


/* Overlays */
.overlay {
  position: absolute; inset: 0;
  background: rgba(10,26,20,0.94);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 200; border-radius: 4px;
  backdrop-filter: blur(4px);
  transition: opacity 0.3s;
}

.overlay.hidden { opacity: 0; pointer-events: none; }

.overlay h2 {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px; color: var(--mint-glow);
  text-shadow: 0 0 10px rgba(94,236,192,0.4);
  margin-bottom: 8px; letter-spacing: 1px;
}

.overlay .big-score {
  font-family: 'Press Start 2P', monospace;
  font-size: 24px; color: var(--gold-light);
  margin-bottom: 4px;
}

.overlay .sub-text {
  font-size: 8px; color: var(--text-dim);
  margin-bottom: 16px;
}

.pixel-btn {
  background: linear-gradient(to bottom, var(--mint-4), var(--mint-6));
  border: 2px solid var(--mint-3);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 9px; padding: 10px 24px;
  border-radius: 4px; cursor: pointer;
  letter-spacing: 1px;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  box-shadow: 0 3px 0 var(--mint-6);
  transition: all 0.1s;
}

.pixel-btn:active {
  box-shadow: 0 1px 0 var(--mint-6);
  transform: translateY(2px);
}

/* Sound toggle */
.sound-toggle {
  position: fixed; top: 8px; right: 10px; z-index: 100;
  background: none; border: 1px solid rgba(125,212,184,0.15);
  color: var(--text-dim); font-size: 14px;
  width: 28px; height: 28px; border-radius: 4px;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}

/* Speed indicator */
.speed-indicator {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; color: var(--text-dim);
  text-align: center; padding: 2px 0;
  position: relative; z-index: 10;
}

/* ─── Lobby ─── */
.lobby-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 500;
  display: flex; align-items: center; justify-content: center;
  overflow-y: auto;
}
.lobby-box { width: min(90vw, 340px); text-align: center; padding: 20px 0; }
.lobby-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(14px, 4vw, 20px);
  color: var(--mint-glow); text-shadow: 0 0 10px rgba(94,236,192,0.4), 2px 2px 0 var(--mint-6);
  letter-spacing: 2px; margin-bottom: 4px;
}
.lobby-sub { font-size: 8px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 24px; font-family: 'Silkscreen', monospace; }
.lobby-section { margin-bottom: 16px; }
.lobby-label { font-family: 'Press Start 2P', monospace; font-size: 7px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
.name-input {
  width: 100%; padding: 10px 14px; background: rgba(94,236,192,0.06);
  border: 2px solid var(--pixel-border); border-radius: 4px;
  color: var(--text); font-family: 'Press Start 2P', monospace; font-size: 10px;
  outline: none; text-align: center;
}
.name-input:focus { border-color: var(--mint-glow); box-shadow: 0 0 8px rgba(94,236,192,0.2); }
.name-input::placeholder { color: var(--text-dim); opacity: 0.4; }
.lobby-lb { margin-top: 8px; }

/* Shared LB styles */
.lb-list { max-height: 260px; overflow-y: auto; }
.lb-empty { font-family: 'Silkscreen', monospace; font-size: 10px; color: var(--text-dim); padding: 14px 0; opacity: 0.5; }
.lb-row {
  display: flex; align-items: center; padding: 6px 10px; margin-bottom: 3px;
  border-radius: 4px; background: rgba(94,236,192,0.04);
  border: 1px solid rgba(94,236,192,0.06);
}
.lb-row.rank-1 { background: rgba(212,168,67,0.1); border-color: rgba(212,168,67,0.2); }
.lb-row.rank-2 { background: rgba(94,236,192,0.07); }
.lb-row.rank-3 { background: rgba(94,236,192,0.05); }
.lb-rank {
  font-family: 'Press Start 2P', monospace; font-size: 10px;
  color: var(--gold-light); width: 24px; text-align: center; flex-shrink: 0;
}
.lb-medal { font-size: 12px; width: 20px; flex-shrink: 0; }
.lb-name { flex: 1; text-align: left; font-family: 'Silkscreen', monospace; font-size: 11px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-score { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--gold-light); flex-shrink: 0; margin-left: 8px; }
.lb-date { font-family: 'Silkscreen', monospace; font-size: 8px; color: var(--text-dim); margin-left: 6px; flex-shrink: 0; }

/* In-game LB toggle */
.lb-toggle {
  position: fixed; top: 8px; left: 10px; z-index: 100;
  background: none; border: 1px solid rgba(94,236,192,0.15);
  color: var(--text-dim); font-size: 12px; width: 28px; height: 28px;
  border-radius: 4px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
}
.lb-toggle.visible { display: flex; }

.lb-panel {
  position: fixed; top: 46px; left: 8px; right: 8px;
  max-width: 320px; margin: 0 auto; z-index: 250;
  background: rgba(12,28,22,0.96); border: 2px solid var(--pixel-border);
  border-radius: 4px; padding: 14px; backdrop-filter: blur(6px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.lb-panel-title {
  font-family: 'Press Start 2P', monospace; font-size: 9px;
  color: var(--mint-glow); letter-spacing: 1px; margin-bottom: 10px; text-align: center;
}
.lb-close {
  position: absolute; top: 6px; right: 10px; background: none; border: none;
  color: var(--text-dim); font-size: 14px; cursor: pointer; font-family: 'Silkscreen', monospace;
}


/* ─── Quiz ─── */
.quiz-overlay {
  position: fixed; inset: 0;
  background: rgba(10,26,20,0.92);
  z-index: 350; display: flex;
  align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}

.quiz-overlay.hidden { display: none; }

.quiz-box {
  width: min(88vw, 340px); text-align: center;
  background: rgba(12,28,22,0.95);
  border: 2px solid var(--gold);
  border-radius: 8px; padding: 20px 16px;
  box-shadow: 0 0 30px rgba(212,168,67,0.15);
}

.quiz-badge {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px; color: var(--gold-light);
  letter-spacing: 2px; margin-bottom: 14px;
  text-shadow: 0 0 8px rgba(212,168,67,0.3);
}

.quiz-question {
  font-family: 'Silkscreen', monospace;
  font-size: 12px; color: var(--text);
  line-height: 1.6; margin-bottom: 18px;
  min-height: 40px;
}

.quiz-buttons {
  display: flex; gap: 16px; justify-content: center;
  margin-bottom: 12px;
}

.quiz-btn {
  width: 64px; height: 64px;
  border-radius: 50%;
  font-family: 'Press Start 2P', monospace;
  font-size: 20px; cursor: pointer;
  border: 3px solid; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}

.quiz-btn:active { transform: scale(0.92); }

.quiz-o {
  background: rgba(94,236,192,0.15);
  border-color: var(--mint-glow);
  color: var(--mint-glow);
  text-shadow: 0 0 8px rgba(94,236,192,0.4);
}

.quiz-o:hover { background: rgba(94,236,192,0.25); box-shadow: 0 0 16px rgba(94,236,192,0.3); }

.quiz-x {
  background: rgba(255,100,100,0.12);
  border-color: #ff6b6b;
  color: #ff6b6b;
  text-shadow: 0 0 8px rgba(255,107,107,0.4);
}

.quiz-x:hover { background: rgba(255,100,100,0.22); box-shadow: 0 0 16px rgba(255,100,100,0.3); }

.quiz-result {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px; padding: 8px; border-radius: 4px;
}

.quiz-result.hidden { display: none; }
.quiz-result.correct { color: var(--mint-glow); background: rgba(94,236,192,0.1); }
.quiz-result.wrong { color: #ff6b6b; background: rgba(255,100,100,0.1); }

</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="scanlines"></div>
<div class="bg-pattern" id="bgPattern"></div>

<button class="sound-toggle" id="soundBtn">🔊</button>

<div class="header">
  <div class="title">RITUAL SNAKE</div>
  <div class="subtitle">COLLECT THE SACRED RUNES</div>
  <div class="credit">Created by Badang</div>
</div>

<div class="score-bar">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
  <div class="stat"><div class="stat-label">Best</div><div class="stat-value" id="best">0</div></div>
  <div class="stat"><div class="stat-label">Runes</div><div class="stat-value" id="runes">0</div></div>
</div>

<div class="game-wrap" id="gameWrap">
  <canvas id="canvas"></canvas>
  <div class="overlay hidden" id="startOverlay">
    <h2>RITUAL SNAKE</h2>
    <div class="sub-text">Swipe to control</div>
    <button class="pixel-btn" id="startBtn">START</button>
  </div>
  <div class="overlay hidden" id="deathOverlay">
    <h2>RITUAL OVER</h2>
    <div class="big-score" id="finalScore">0</div>
    <div class="sub-text" id="finalSub">Runes collected: 0</div>
    <button class="pixel-btn" id="retryBtn">RETRY</button>
    <button class="pixel-btn" id="lobbyBtn" style="margin-top:8px;background:transparent;border:2px solid rgba(94,236,192,0.2);font-size:7px;padding:7px 16px;box-shadow:none;">LOBBY</button>
  </div>
</div>

<div class="speed-indicator" id="speedInd">SPD: 1</div>



<script>
// ═══════════════════════ CONFIG ═══════════════════════
const GRID = 20;
const INITIAL_SPEED = 150;
const SPEED_INCREASE = 3;
const MIN_SPEED = 60;


// ═══════════════════════ QUIZ SYSTEM ═══════════════════════
const QUIZ_QUESTIONS = [
  // Overview & Identity
  { q: "Ritual calls itself the most expressive blockchain in existence", a: true },
  { q: "Ritual is a Layer 2 scaling solution built on Ethereum", a: false },
  { q: "Ritual is an EVM-compatible L1 blockchain", a: true },
  { q: "Ritual only focuses on Crypto x AI use cases", a: false },
  { q: "Ritual supports heterogeneous compute, not just AI", a: true },

  // Infernet
  { q: "Infernet is Ritual's decentralized oracle network for AI compute", a: true },
  { q: "Infernet only works on Ritual Chain", a: false },
  { q: "Infernet can bring AI computation to any EVM-compatible blockchain", a: true },
  { q: "Infernet is enshrined into Ritual Chain's architecture", a: true },

  // Resonance
  { q: "Resonance is Ritual's transaction fee mechanism", a: true },
  { q: "Resonance uses a simple first-price auction like Bitcoin", a: false },
  { q: "Resonance introduces 'brokers' that match transactions to nodes", a: true },
  { q: "Resonance lets users choose to prioritize speed or cost", a: true },
  { q: "Resonance uses multi-dimensional EIP-1559 for pricing", a: false },

  // Symphony
  { q: "Symphony is Ritual's consensus protocol", a: true },
  { q: "Symphony uses an Execute-Once-Verify-Many-Times (EOVMT) model", a: true },
  { q: "In Symphony, all nodes must re-execute every transaction", a: false },
  { q: "Symphony requires 2/3 of staked value to be controlled by honest participants for safety", a: true },
  { q: "Symphony only supports ZK proofs for verification", a: false },

  // EVM++ & Sidecars
  { q: "EVM++ extends the standard EVM with expressive compute precompiles", a: true },
  { q: "Sidecars are modular extensions that handle AI inference and ZK proving", a: true },
  { q: "EVM++ is not backwards compatible with standard EVM", a: false },

  // Guardians
  { q: "Guardians are compute firewalls that let nodes filter which tasks to execute", a: true },
  { q: "Guardians prevent nodes from participating in consensus", a: false },
  { q: "Guardians can use statistical firewalls based on embedding distances", a: true },

  // Node Specialization
  { q: "Ritual supports node specialization for fine-tuned workloads", a: true },
  { q: "All Ritual nodes must have identical hardware", a: false },

  // Scheduled Transactions
  { q: "Ritual supports scheduled transactions without external keepers", a: true },
  { q: "Scheduled transactions on Ritual require third-party keeper networks", a: false },

  // Modular Storage
  { q: "Ritual's modular storage supports both web2 (HuggingFace) and web3 (Arweave)", a: true },
  { q: "Ritual only stores data on-chain", a: false },

  // Proof Systems
  { q: "Ritual is proof system agnostic, supporting ZK, OPML, TEE, and more", a: true },
  { q: "Ritual only uses ZKML for AI verification", a: false },
  { q: "Ritual supports TEE (Trusted Execution Environment) based computation", a: true },

  // Model Marketplace & Provenance
  { q: "Ritual has a model marketplace for monetizing AI models", a: true },
  { q: "Ritual supports verifiable provenance for AI models", a: true },

  // Smart Agents
  { q: "Ritual provides built-in mechanisms for autonomous on-chain agents", a: true },

  // General / FAQ
  { q: "You need a GPU to build applications on Ritual", a: false },
  { q: "Ritual is only for web3 developers", a: false },
  { q: "Ritual supports AI operations beyond just inference, including fine-tuning", a: true },
  { q: "Ritual Chain is currently running in a private testnet", a: true },
  { q: "Ethereum developers can port their apps to Ritual seamlessly", a: true },

  // Beyond Crypto x AI
  { q: "Other blockchains like MegaETH can use Ritual as a prover network", a: true },
  { q: "Ritual offers L2 Rollup-as-a-Service capabilities", a: true },
  { q: "Ritual only serves its own chain and cannot help other blockchains", a: false },
];

const SPECIAL_CHANCE = 0.2; // 20% chance food is special quiz orb
let specialFood = false; // is current food a special quiz orb?
let quizActive = false;
let currentQuiz = null;
let quizUsedIndices = [];

// ═══════════════════════ AUDIO ═══════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
let soundOn = true;

function ensureAudio() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
}

function tone(freq, dur, type='square', vol=0.08) {
  if (!soundOn || !actx) return;
  try {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, actx.currentTime);
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch(e) {}
}

function sfxEat() {
  tone(440, 0.06, 'square', 0.10);
  setTimeout(() => tone(660, 0.06, 'square', 0.08), 50);
  setTimeout(() => tone(880, 0.08, 'square', 0.06), 100);
}

function sfxDie() {
  tone(200, 0.2, 'square', 0.10);
  setTimeout(() => tone(150, 0.2, 'square', 0.08), 150);
  setTimeout(() => tone(100, 0.3, 'sawtooth', 0.06), 300);
}

function sfxMove() {
  tone(200, 0.02, 'square', 0.02);
}


function sfxQuizRight() {
  tone(523, 0.1, 'square', 0.08);
  setTimeout(() => tone(659, 0.1, 'square', 0.08), 80);
  setTimeout(() => tone(784, 0.15, 'square', 0.10), 160);
  setTimeout(() => tone(1047, 0.2, 'square', 0.08), 240);
}

function sfxQuizWrong() {
  tone(300, 0.15, 'square', 0.08);
  setTimeout(() => tone(200, 0.2, 'sawtooth', 0.06), 120);
}

document.getElementById('soundBtn').addEventListener('click', () => {
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔊' : '🔇';
});

// Realtime listener
lbRef.on('value', (snapshot) => {
  const entries = [];
  snapshot.forEach(child => entries.push(child.val()));
  entries.sort((a, b) => b.score - a.score);
  lbCache = entries.slice(0, MAX_LB);
  renderLb('lobbyLbList', lbCache);
  renderLb('gameLbList', lbCache);
});

function renderLb(targetId, lb) {
  const el = document.getElementById(targetId);
  if (!el) return;
  if (!lb || lb.length === 0) {
    el.innerHTML = '<div class="lb-empty">No records yet</div>';
    return;
  }
  const medals = ['👑', '⚜', '✧'];
  let html = '';
  lb.forEach((entry, i) => {
    const rc = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    html += `<div class="lb-row ${rc}">
      <div class="lb-rank">${i+1}</div>
      <div class="lb-medal">${medals[i] || ''}</div>
      <div class="lb-name">${entry.name}</div>
      <div class="lb-score">${entry.score.toLocaleString()}</div>
      <div class="lb-date">${entry.date || ''}</div>
    </div>`;
  });
  el.innerHTML = html;
}

function saveScore(name, score, runes) {
  const now = new Date();
  const dateStr = (now.getMonth()+1) + '/' + now.getDate();
  lbRef.push({ name, score, runes, date: dateStr, timestamp: Date.now() });
}

// ═══════════════════════ GAME ═══════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let cellSize, cols, rows;
let snake, dir, nextDir, food, pts, runeCount, alive, speed, gameLoop;
let bestPts = parseInt(localStorage.getItem('ritualSnakeBest') || '0');

document.getElementById('best').textContent = bestPts;

function setupCanvas() {
  const maxW = Math.min(window.innerWidth * 0.92, 400);
  const maxH = window.innerHeight - 260;
  const size = Math.min(maxW, maxH);
  cellSize = Math.floor(size / GRID);
  canvas.width = cellSize * GRID;
  canvas.height = cellSize * GRID;
  cols = rows = GRID;
}

function resetGame() {
  const mid = Math.floor(GRID / 2);
  snake = [
    {x: mid, y: mid},
    {x: mid - 1, y: mid},
    {x: mid - 2, y: mid}
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  pts = 0;
  runeCount = 0;
  speed = INITIAL_SPEED;
  alive = true;
  specialFood = false;
  quizActive = false;
  quizUsedIndices = [];
  placeFood();
  updateUI();
}

function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * cols),
      y: Math.floor(Math.random() * rows)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
  specialFood = (runeCount > 0 && Math.random() < SPECIAL_CHANCE);
}

function update() {
  dir = nextDir;
  const head = {
    x: (snake[0].x + dir.x + cols) % cols,
    y: (snake[0].y + dir.y + rows) % rows
  };

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    die();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    sfxEat();

    if (specialFood) {
      // Don't grow snake for quiz orb - remove tail
      snake.pop();
      // Pause game and show quiz
      clearInterval(gameLoop);
      showQuiz();
    } else {
      runeCount++;
      pts += 10 + Math.floor(runeCount / 3) * 5;
      speed = Math.max(MIN_SPEED, INITIAL_SPEED - runeCount * SPEED_INCREASE);
      placeFood();
      clearInterval(gameLoop);
      gameLoop = setInterval(update, speed);
    }
    updateUI();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  // Background
  ctx.fillStyle = '#0d1f18';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = 'rgba(94, 236, 192, 0.04)';
  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      ctx.fillRect(x * cellSize + cellSize/2, y * cellSize + cellSize/2, 1, 1);
    }
  }

  // Snake body
  snake.forEach((seg, i) => {
    const t = 1 - (i / snake.length) * 0.6;
    if (i === 0) {
      // Head - brighter
      ctx.fillStyle = '#5eecc0';
      ctx.shadowColor = '#5eecc0';
      ctx.shadowBlur = 6;
    } else {
      ctx.fillStyle = `rgba(77, 186, 150, ${t})`;
      ctx.shadowBlur = 0;
    }

    const pad = i === 0 ? 0 : 1;
    ctx.fillRect(
      seg.x * cellSize + pad,
      seg.y * cellSize + pad,
      cellSize - pad * 2,
      cellSize - pad * 2
    );
    ctx.shadowBlur = 0;

    // Pixel eyes on head
    if (i === 0) {
      ctx.fillStyle = '#0a1a14';
      const eyeSize = Math.max(2, Math.floor(cellSize * 0.2));
      if (dir.x === 1) {
        ctx.fillRect(seg.x * cellSize + cellSize - eyeSize - 2, seg.y * cellSize + 3, eyeSize, eyeSize);
        ctx.fillRect(seg.x * cellSize + cellSize - eyeSize - 2, seg.y * cellSize + cellSize - eyeSize - 3, eyeSize, eyeSize);
      } else if (dir.x === -1) {
        ctx.fillRect(seg.x * cellSize + 2, seg.y * cellSize + 3, eyeSize, eyeSize);
        ctx.fillRect(seg.x * cellSize + 2, seg.y * cellSize + cellSize - eyeSize - 3, eyeSize, eyeSize);
      } else if (dir.y === -1) {
        ctx.fillRect(seg.x * cellSize + 3, seg.y * cellSize + 2, eyeSize, eyeSize);
        ctx.fillRect(seg.x * cellSize + cellSize - eyeSize - 3, seg.y * cellSize + 2, eyeSize, eyeSize);
      } else {
        ctx.fillRect(seg.x * cellSize + 3, seg.y * cellSize + cellSize - eyeSize - 2, eyeSize, eyeSize);
        ctx.fillRect(seg.x * cellSize + cellSize - eyeSize - 3, seg.y * cellSize + cellSize - eyeSize - 2, eyeSize, eyeSize);
      }
    }
  });

  // Food orb
  const fx = food.x * cellSize + cellSize / 2;
  const fy = food.y * cellSize + cellSize / 2;
  const fr = cellSize * 0.42;
  const pulse = Math.sin(Date.now() * 0.004) * 0.15 + 0.85;

  const orbColor = specialFood ? '#d4a843' : '#5eecc0';
  const orbColorInner = specialFood ? '#f0d68a' : '#b8f5e0';
  const orbColorMid = specialFood ? '#d4a843' : '#5eecc0';
  const orbColorDark = specialFood ? '#8a6a20' : '#2d9e7a';
  const orbColorDeep = specialFood ? '#5a4510' : '#1a6b52';

  // Outer glow
  ctx.shadowColor = orbColor;
  ctx.shadowBlur = 12 * pulse;
  const outerGrad = ctx.createRadialGradient(fx, fy, fr * 0.2, fx, fy, fr * 1.3);
  outerGrad.addColorStop(0, specialFood ? 'rgba(212,168,67,0.2)' : 'rgba(94,236,192,0.15)');
  outerGrad.addColorStop(1, specialFood ? 'rgba(212,168,67,0)' : 'rgba(94,236,192,0)');
  ctx.fillStyle = outerGrad;
  ctx.beginPath();
  ctx.arc(fx, fy, fr * 1.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Main orb body
  const orbGrad = ctx.createRadialGradient(fx - fr*0.25, fy - fr*0.3, fr*0.1, fx, fy, fr);
  orbGrad.addColorStop(0, orbColorInner);
  orbGrad.addColorStop(0.3, orbColorMid);
  orbGrad.addColorStop(0.65, orbColorDark);
  orbGrad.addColorStop(1, orbColorDeep);
  ctx.fillStyle = orbGrad;
  ctx.beginPath();
  ctx.arc(fx, fy, fr, 0, Math.PI * 2);
  ctx.fill();

  // Glass rim highlight
  ctx.strokeStyle = specialFood ? 'rgba(240,214,138,0.4)' : 'rgba(184,245,224,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(fx, fy, fr - 1, 0, Math.PI * 2);
  ctx.stroke();



  // Top shine reflection
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(fx - fr*0.15, fy - fr*0.35, fr*0.35, fr*0.18, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // Small specular dot
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(fx - fr*0.2, fy - fr*0.4, fr*0.08, 0, Math.PI * 2);
  ctx.fill();

  // Special orb "?" indicator
  if (specialFood) {
    ctx.fillStyle = '#0a1a14';
    ctx.font = `bold ${Math.floor(fr*1.1)}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('?', fx, fy + 1);
  }

  // Bottom ambient reflection
  const botGrad = ctx.createRadialGradient(fx, fy + fr*0.3, 0, fx, fy + fr*0.3, fr*0.5);
  botGrad.addColorStop(0, specialFood ? 'rgba(240,214,138,0.2)' : 'rgba(94,236,192,0.1)');
  botGrad.addColorStop(1, specialFood ? 'rgba(240,214,138,0)' : 'rgba(94,236,192,0)');
  ctx.fillStyle = botGrad;
  ctx.beginPath();
  ctx.arc(fx, fy + fr*0.3, fr*0.5, 0, Math.PI * 2);
  ctx.fill();

  // Pixel sparkles around orb
  const sparkT = Date.now() * 0.003;
  ctx.fillStyle = `rgba(240,214,138,${0.4 + Math.sin(sparkT)*0.3})`;
  ctx.fillRect(fx + Math.cos(sparkT)*fr*1.4 - 1, fy + Math.sin(sparkT)*fr*1.2 - 1, 2, 2);
  ctx.fillRect(fx + Math.cos(sparkT+2)*fr*1.3 - 1, fy + Math.sin(sparkT+2)*fr*1.1 - 1, 2, 2);
  ctx.fillStyle = `rgba(94,236,192,${0.3 + Math.sin(sparkT+1)*0.3})`;
  ctx.fillRect(fx + Math.cos(sparkT+4)*fr*1.5 - 1, fy + Math.sin(sparkT+4)*fr*1.3 - 1, 2, 2);
}

function die() {
  alive = false;
  clearInterval(gameLoop);
  sfxDie();
  if (pts > bestPts) {
    bestPts = pts;
    localStorage.setItem('ritualSnakeBest', bestPts);
    document.getElementById('best').textContent = bestPts;
  }
  // Save to Firebase
  if (pts > 0) saveScore(playerName, pts, runeCount);
  // Find rank
  const rank = lbCache.filter(e => e.score > pts).length + 1;
  const rankText = rank <= MAX_LB ? ` · Rank #${rank}` : '';
  document.getElementById('finalScore').textContent = pts;
  document.getElementById('finalSub').textContent = `Runes: ${runeCount} · Speed: ${Math.floor((INITIAL_SPEED - speed) / SPEED_INCREASE) + 1}${rankText}`;
  document.getElementById('deathOverlay').classList.remove('hidden');
}

function updateUI() {
  document.getElementById('score').textContent = pts;
  document.getElementById('runes').textContent = runeCount;
  document.getElementById('speedInd').textContent = `SPD: ${Math.floor((INITIAL_SPEED - speed) / SPEED_INCREASE) + 1}`;
}

function startGame() {
  ensureAudio();
  setupCanvas();
  resetGame();
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('deathOverlay').classList.add('hidden');
  draw();
  gameLoop = setInterval(update, speed);
}


// ═══════════════════════ QUIZ FUNCTIONS ═══════════════════════
function showQuiz() {
  quizActive = true;
  // Pick unused question
  if (quizUsedIndices.length >= QUIZ_QUESTIONS.length) quizUsedIndices = [];
  let idx;
  do { idx = Math.floor(Math.random() * QUIZ_QUESTIONS.length); }
  while (quizUsedIndices.includes(idx));
  quizUsedIndices.push(idx);
  currentQuiz = QUIZ_QUESTIONS[idx];

  document.getElementById('quizQuestion').textContent = currentQuiz.q;
  document.getElementById('quizResult').classList.add('hidden');
  document.getElementById('quizO').disabled = false;
  document.getElementById('quizX').disabled = false;
  document.getElementById('quizOverlay').classList.remove('hidden');
}

function answerQuiz(answer) {
  ensureAudio();
  const correct = (answer === currentQuiz.a);
  const resultEl = document.getElementById('quizResult');
  document.getElementById('quizO').disabled = true;
  document.getElementById('quizX').disabled = true;

  if (correct) {
    sfxQuizRight();
    resultEl.textContent = 'CORRECT! Speed reduced!';
    resultEl.className = 'quiz-result correct';
    // Reward: reduce speed (slow down = easier)
    speed = Math.min(INITIAL_SPEED, speed + 20);
  } else {
    sfxQuizWrong();
    resultEl.textContent = 'WRONG! Speed up!';
    resultEl.className = 'quiz-result wrong';
    // Penalty: increase speed
    speed = Math.max(MIN_SPEED, speed - 15);
  }

  updateUI();

  // Auto-close after delay and resume game
  setTimeout(() => {
    document.getElementById('quizOverlay').classList.add('hidden');
    quizActive = false;
    placeFood();
    gameLoop = setInterval(update, speed);
  }, 1200);
}

// ═══════════════════════ INPUT ═══════════════════════
document.addEventListener('keydown', e => {
  if (!alive) return;
  ensureAudio();
  const map = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
    ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
    w: {x:0,y:-1}, s: {x:0,y:1},
    a: {x:-1,y:0}, d: {x:1,y:0}
  };
  const nd = map[e.key];
  if (nd && (nd.x + dir.x !== 0 || nd.y + dir.y !== 0)) {
    nextDir = nd;
    sfxMove();
  }
});



// Swipe
let touchStart = null;
document.addEventListener('touchstart', e => {
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive: true});

document.addEventListener('touchmove', e => {
  if (!touchStart || !alive) return;
  const dx = e.touches[0].clientX - touchStart.x;
  const dy = e.touches[0].clientY - touchStart.y;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  ensureAudio();
  let nd;
  if (Math.abs(dx) > Math.abs(dy)) {
    nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  } else {
    nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  }
  if (nd.x + dir.x !== 0 || nd.y + dir.y !== 0) {
    nextDir = nd;
    sfxMove();
  }
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive: true});

    </div>

</div>
